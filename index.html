<title>Dr. Bruno — Advocacia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    --green-900: #0f2a23;
    --green-800: #1a3d33;
    --green-700: #234d40;
    --green-50:  #e8efe9;
    --green-100: #d9e6dc;
    --cream:     #f4ebd9;
    --cream-2:   #ecdfc5;
    --gold:      #c89656;
    --gold-2:    #b8843f;
    --ink:       #1a1a1a;
    --ink-60:    #4a4a4a;
    --ink-40:    #7a7a7a;
    --line:      rgba(15,42,35,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  html, body { background: var(--cream); color: var(--ink); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .serif { font-family: 'Cormorant Garamond', serif; font-weight: 500; letter-spacing: -0.01em; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  #root { min-height: 100vh; }

  /* ====== RESPONSIVE ====== */
  @media (max-width: 860px) {
    .rgrid { grid-template-columns: 1fr !important; }
    .hero-grid { margin-top: 28px !important; min-height: auto !important; }
    .hero-photo { min-height: 360px !important; }
    .hero-stats { flex-wrap: wrap !important; gap: 20px 28px !important; }
    .rnav { padding: 8px 12px 8px 18px !important; }
    .rnav-links { display: none !important; }
    .sec-y { padding-top: 72px !important; padding-bottom: 72px !important; }
    .sec-b { padding-bottom: 72px !important; }
    .areas-head { flex-direction: column !important; align-items: flex-start !important; gap: 18px !important; }
    .area-row { grid-template-columns: 44px 1fr 40px !important; column-gap: 12px !important; row-gap: 8px !important; padding: 18px 14px !important; }
    .area-title { font-size: 18px !important; }
    .area-desc { grid-column: 1 / -1 !important; font-size: 13px !important; }
    .support-card { padding: 48px 24px !important; }
    .support-stats { flex-wrap: wrap !important; gap: 18px 28px !important; }
    .testi-card { padding: 32px 24px !important; }
    .contact-pane { padding: 32px 24px !important; min-height: auto !important; }
    .contact-grid { border-radius: 24px !important; }
    .sent-overlay { inset: 24px !important; }
    .about-badge { right: 10px !important; bottom: 12px !important; width: 180px !important; padding: 18px !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
    .footer-bottom { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
    .orbit-wrap { height: 580px !important; }
    .orbit-head { top: 28px !important; padding: 0 16px !important; }
  }
  @media (max-width: 480px) {
    .footer-grid { grid-template-columns: 1fr !important; }
    .hero-photo { min-height: 300px !important; }
  }
</style>

  const [autoRotate, setAutoRotate] = useState(true);
  const [pulse, setPulse] = useState({});
  const [activeId, setActiveId] = useState(null);
  const containerRef = useRef(null);
  const orbitRef = useRef(null);

  const handleBgClick = (e) => {
    if (e.target === containerRef.current || e.target === orbitRef.current) {
      setExpanded({}); setActiveId(null); setPulse({}); setAutoRotate(true);
    }
  };

  const getRelated = (id) => {
    const item = timelineData.find(t => t.id === id);
    return item ? item.relatedIds : [];
  };

  const centerViewOnNode = (id) => {
    const idx = timelineData.findIndex(t => t.id === id);
    const target = (idx / timelineData.length) * 360;
    setRotation(270 - target);
  };

  const toggle = (id) => {
    setExpanded(prev => {
      const next = {};
      Object.keys(prev).forEach(k => { if (parseInt(k) !== id) next[parseInt(k)] = false; });
      next[id] = !prev[id];
      if (!prev[id]) {
        setActiveId(id); setAutoRotate(false);
        const rel = getRelated(id);
        const p = {}; rel.forEach(r => p[r] = true); setPulse(p);
        centerViewOnNode(id);
      } else {
        setActiveId(null); setAutoRotate(true); setPulse({});
      }
      return next;
    });
  };

  useEffect(() => {
    if (!autoRotate) return;
    const t = setInterval(() => setRotation(r => +((r + 0.25) % 360).toFixed(3)), 50);
    return () => clearInterval(t);
  }, [autoRotate]);

  const calcPos = (i, total) => {
    const angle = ((i / total) * 360 + rotation) % 360;
    const radius = isMobile ? 130 : 220;
    const rad = (angle * Math.PI) / 180;
    return {
      x: radius * Math.cos(rad),
      y: radius * Math.sin(rad),
      zIndex: Math.round(100 + 50 * Math.cos(rad)),
      opacity: Math.max(0.45, Math.min(1, 0.45 + 0.55 * ((1 + Math.sin(rad)) / 2))),
    };
  };

  const isRelated = (id) => activeId && getRelated(activeId).includes(id);

  const statusStyles = (s) => {
    switch (s) {
      case 'completed': return { color: '#1a1a1a', background: 'var(--gold)', border: '1px solid var(--gold)' };
      case 'in-progress': return { color: 'var(--gold)', background: 'rgba(200,150,86,0.15)', border: '1px solid var(--gold)' };
      default: return { color: 'rgba(255,255,255,0.85)', background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.3)' };
    }
  };

  return (
    <section className="sec-b" style={{ background: 'var(--cream)', padding: '0 0 120px' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 28px' }}>
        <div
          ref={containerRef}
          onClick={handleBgClick}
          className="orbit-wrap"
          style={{
            position: 'relative', borderRadius: 32, overflow: 'hidden',
            background: 'radial-gradient(ellipse at 50% 50%, #1a3d33 0%, #0f2a23 70%, #081814 100%)',
            height: 720, display: 'flex', flexDirection: 'column', alignItems: 'center',
          }}
        >
          {/* Header overlay */}
          <div className="orbit-head" style={{ position: 'absolute', top: 56, left: 0, right: 0, textAlign: 'center', zIndex: 5, pointerEvents: 'none' }}>
            <span style={{
              display: 'inline-flex', alignItems: 'center', gap: 8,
              padding: '8px 16px', borderRadius: 999,
              background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.18)',
              color: '#e9ddc1', fontSize: 12, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 500,
            }}>
              <span style={{ width: 6, height: 6, borderRadius: 999, background: 'var(--gold)' }} />
              Como trabalho
            </span>
            <h2 className="serif" style={{ fontSize: 'clamp(28px, 5.5vw, 52px)', lineHeight: 1.05, marginTop: 16, color: '#fff' }}>
              Da consulta inicial à <span style={{ color: 'var(--gold)', fontStyle: 'italic' }}>resolução</span>
            </h2>
            <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.6)', marginTop: 12, maxWidth: 480, marginLeft: 'auto', marginRight: 'auto' }}>
              Clique nos pontos da órbita para conhecer cada etapa do nosso processo.
            </p>
          </div>

          <div style={{ position: 'relative', width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <div
              ref={orbitRef}
              style={{ position: 'absolute', width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', perspective: '1000px' }}
            >
              {/* Center sun */}
              <div style={{
                position: 'absolute', width: 72, height: 72, borderRadius: 999,
                background: 'radial-gradient(circle at 30% 30%, #f4ebd9, #c89656 60%, #b8843f)',
                display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 10,
                boxShadow: '0 0 60px rgba(200,150,86,0.5)',
              }}>
                <div className="ring-ping" style={{ position: 'absolute', width: 96, height: 96, borderRadius: 999, border: '1px solid rgba(244,235,217,0.4)' }} />
                <div className="ring-ping ring-ping-delay" style={{ position: 'absolute', width: 120, height: 120, borderRadius: 999, border: '1px solid rgba(244,235,217,0.25)' }} />
                <div style={{ width: 32, height: 32, borderRadius: 999, background: 'rgba(255,255,255,0.85)', backdropFilter: 'blur(10px)' }} />
              </div>

              {/* Orbit ring */}
              <div style={{ position: 'absolute', width: isMobile ? 280 : 460, height: isMobile ? 280 : 460, borderRadius: 999, border: '1px dashed rgba(244,235,217,0.18)' }} />
              <div style={{ position: 'absolute', width: isMobile ? 280 : 460, height: isMobile ? 280 : 460, borderRadius: 999, border: '1px solid rgba(244,235,217,0.06)' }} />

              {timelineData.map((item, i) => {
                const pos = calcPos(i, timelineData.length);
                const isOpen = !!expanded[item.id];
                const rel = isRelated(item.id);
                const isPulsing = pulse[item.id];
                const Icon = item.icon;

                return (
                  <div
                    key={item.id}
                    onClick={(e) => { e.stopPropagation(); toggle(item.id); }}
                    style={{
                      position: 'absolute',
                      transform: `translate(${pos.x}px, ${pos.y}px)`,
                      zIndex: isOpen ? 200 : pos.zIndex,
                      opacity: isOpen ? 1 : pos.opacity,
                      transition: 'all .7s cubic-bezier(0.4, 0, 0.2, 1)',
                      cursor: 'pointer',
                    }}
                  >
                    {/* Glow */}
                    <div className={isPulsing ? 'orbital-pulse' : ''} style={{
                      position: 'absolute',
                      width: item.energy * 0.5 + 50, height: item.energy * 0.5 + 50,
                      left: -(item.energy * 0.5 + 50 - 44) / 2,
                      top: -(item.energy * 0.5 + 50 - 44) / 2,
                      borderRadius: 999,
                      background: 'radial-gradient(circle, rgba(200,150,86,0.35) 0%, rgba(200,150,86,0) 70%)',
                    }} />

                    {/* Node */}
                    <div style={{
                      width: 44, height: 44, borderRadius: 999,
                      background: isOpen ? 'var(--gold)' : rel ? 'rgba(244,235,217,0.6)' : 'rgba(15,42,35,0.85)',
                      color: isOpen ? '#1a1a1a' : rel ? '#1a1a1a' : '#f4ebd9',
                      border: isOpen ? '2px solid var(--gold)' : rel ? '2px solid var(--gold)' : '2px solid rgba(244,235,217,0.4)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      boxShadow: isOpen ? '0 0 30px rgba(200,150,86,0.6)' : 'none',
                      transform: isOpen ? 'scale(1.4)' : 'scale(1)',
                      transition: 'all .3s ease',
                    }}>
                      <Icon width="18" height="18" />
                    </div>

                    {/* Title */}
                    <div style={{
                      position: 'absolute', top: 56, left: '50%', transform: `translateX(-50%) ${isOpen ? 'scale(1.15)' : 'scale(1)'}`,
                      whiteSpace: 'nowrap', fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase',
                      color: isOpen ? '#fff' : 'rgba(255,255,255,0.65)',
                      transition: 'all .3s ease',
                    }}>
                      {item.title}
                    </div>

                    {/* Expanded card */}
                    {isOpen && (
                      <div style={{
                        position: 'absolute', top: isMobile ? 72 : 96, left: '50%', transform: 'translateX(-50%)',
                        width: isMobile ? 220 : 280, padding: isMobile ? 14 : 18,
                        background: 'rgba(15,42,35,0.92)', backdropFilter: 'blur(16px)',
                        border: '1px solid rgba(244,235,217,0.25)', borderRadius: 16,
                        boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
                        color: '#fff',
                      }}
                        onClick={(e) => e.stopPropagation()}>
                        <div style={{ position: 'absolute', top: -12, left: '50%', transform: 'translateX(-50%)', width: 1, height: 12, background: 'rgba(244,235,217,0.4)' }} />

                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                          <span style={{
                            padding: '4px 10px', borderRadius: 999, fontSize: 10, fontWeight: 700, letterSpacing: '0.1em',
                            ...statusStyles(item.status),
                          }}>
                            {STATUS_LABEL[item.status]}
                          </span>
                          <span style={{ fontFamily: 'monospace', fontSize: 11, color: 'rgba(255,255,255,0.55)' }}>{item.date}</span>
                        </div>

                        <h4 className="serif" style={{ fontSize: 22, marginTop: 12, fontWeight: 600 }}>{item.title}</h4>

                        <p style={{ fontSize: 12.5, lineHeight: 1.55, color: 'rgba(255,255,255,0.8)', marginTop: 8 }}>{item.content}</p>

                        <div style={{ marginTop: 16, paddingTop: 12, borderTop: '1px solid rgba(244,235,217,0.12)' }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, marginBottom: 6, color: 'rgba(255,255,255,0.7)' }}>
                            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                              <OrbitIcons.Zap width="11" height="11" /> Progresso
                            </span>
                            <span style={{ fontFamily: 'monospace' }}>{item.energy}%</span>
                          </div>
                          <div style={{ width: '100%', height: 4, borderRadius: 999, background: 'rgba(255,255,255,0.1)', overflow: 'hidden' }}>
                            <div style={{ height: '100%', width: `${item.energy}%`, background: 'linear-gradient(90deg, var(--gold), #f4ebd9)' }} />
                          </div>
                        </div>

                        {item.relatedIds.length > 0 && (
                          <div style={{ marginTop: 14, paddingTop: 12, borderTop: '1px solid rgba(244,235,217,0.12)' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 8, color: 'rgba(255,255,255,0.7)' }}>
                              <OrbitIcons.Link width="10" height="10" />
                              <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.14em', textTransform: 'uppercase' }}>Etapas conectadas</span>
                            </div>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                              {item.relatedIds.map(rid => {
                                const related = timelineData.find(t => t.id === rid);
                                return (
                                  <button key={rid}
                                    onClick={(e) => { e.stopPropagation(); toggle(rid); }}
                                    style={{
                                      display: 'inline-flex', alignItems: 'center', gap: 6,
                                      padding: '6px 10px', fontSize: 10, fontWeight: 500,
                                      background: 'rgba(244,235,217,0.06)', border: '1px solid rgba(244,235,217,0.2)',
                                      color: 'rgba(255,255,255,0.85)', borderRadius: 6, cursor: 'pointer',
                                    }}>
                                    {related?.title}
                                    <OrbitIcons.ArrowRight width="9" height="9" />
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Footer hint */}
          <div style={{ position: 'absolute', bottom: 24, left: 0, right: 0, textAlign: 'center', fontSize: 11, color: 'rgba(255,255,255,0.4)', letterSpacing: '0.14em', textTransform: 'uppercase' }}>
            {activeId ? 'Clique fora para voltar à órbita' : 'Toque em qualquer etapa para explorar'}
          </div>
        </div>
      </div>

      <style>{`
        @keyframes orbital-pulse-kf { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 0.4; } }
        .orbital-pulse { animation: orbital-pulse-kf 1.6s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes ring-ping-kf { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }
        .ring-ping { animation: ring-ping-kf 2.2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        .ring-ping-delay { animation-delay: 0.7s; }
      `}</style>
    </section>
  );
};

window.RadialOrbitalTimeline = RadialOrbitalTimeline;

</script>

/* ============== ICONS ============== */

/* ============== ANIMATED ROTATING WORD ============== */
const RotatingWord = ({ words, interval = 2200 }) => {
  const [i, setI] = useState(0);
  useEffect(() => {
    const t = setTimeout(() => setI((i + 1) % words.length), interval);
    return () => clearTimeout(t);
  }, [i, words.length, interval]);

  // Use widest word to reserve space — prevents layout shift
  const widest = words.reduce((a, b) => (a.length >= b.length ? a : b), '');

  return (
    <span style={{
      position: 'relative', display: 'inline-block',
      verticalAlign: 'baseline', overflow: 'hidden',
      color: 'var(--gold)', fontStyle: 'italic',
    }}>
      {/* invisible spacer holds width */}
      <span style={{ visibility: 'hidden', whiteSpace: 'nowrap' }}>{widest}</span>
      {words.map((w, idx) => {
        const active = idx === i;
        const before = idx < i || (i === 0 && idx === words.length - 1 && false);
        // simple direction: if previous index, slide up & out; if future, slide up from below
        const offset = active ? 0 : (idx < i ? -120 : 120);
        return (
          <span key={w} style={{
            position: 'absolute', inset: 0, whiteSpace: 'nowrap',
            transform: `translateY(${offset}%)`,
            opacity: active ? 1 : 0,
            transition: 'transform .65s cubic-bezier(.22,1,.36,1), opacity .45s ease',
          }}>
            {w}
          </span>
        );
      })}
    </span>
  );
};

                  <span style={{
                    width: 36, height: 36, borderRadius: 999,

                    color: isOpen ? 'var(--gold)' : 'var(--green-800)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                  }}>
                    {isOpen ? <Icon.Minus width="16" height="16" /> : <Icon.Plus width="16" height="16" />}
                  </span>
                </button>
                <div style={{
                  maxHeight: isOpen ? 500 : 0, overflow: 'hidden', transition: 'max-height .35s ease',
                }}>

                </div>
              </div>

/* ============== CONTACT ============== */
const Contact = () => {
  const [form, setForm] = useState({ name: '', email: '', phone: '', area: '', msg: '' });
  const [sent, setSent] = useState(false);
  const update = k => e => setForm({ ...form, [k]: e.target.value });
  const submit = e => {
    e.preventDefault();
    if (!form.name || !form.email) return;
    setSent(true);
    setTimeout(() => { setSent(false); setForm({ name: '', email: '', phone: '', area: '', msg: '' }); }, 3500);
  };

  return (
    <section id="contato" className="sec-b" style={{ background: 'var(--cream)', padding: '0 0 120px' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 28px' }}>
        <div className="rgrid contact-grid" style={{
          background: 'linear-gradient(135deg, #0f2a23, #1a3d33)', borderRadius: 32, overflow: 'hidden',
          display: 'grid', gridTemplateColumns: '1fr 1fr',
        }}>
          {/* Left: image + info */}
          <div className="contact-pane" style={{ position: 'relative', padding: 56, color: '#fff', minHeight: 600 }}>
            <DecorScales />
            <div style={{ position: 'relative' }}>
              <PillTag dark>Entre em Contato</PillTag>
              <h2 className="serif" style={{ fontSize: 'clamp(30px, 5.6vw, 52px)', lineHeight: 1.05, marginTop: 18 }}>
                Vamos Conversar Sobre o seu <span style={{ color: 'var(--gold)', fontStyle: 'italic' }}>Caso</span>.
              </h2>
              <p style={{ fontSize: 15, lineHeight: 1.6, color: 'rgba(255,255,255,0.7)', marginTop: 20, maxWidth: 380 }}>
                Resposta em até 24h úteis. Primeira consulta é por nossa conta.
              </p>

              <div style={{ marginTop: 40, display: 'grid', gap: 18 }}>
                {[
                  [Icon.Phone, 'Telefone', '+55 (21) 96937-3237'],
                  [Icon.Whatsapp, 'WhatsApp', '+55 (21) 96937-3237'],
                  [Icon.Mail, 'E-mail', 'contato@brunoadvocacia.com.br'],
                  [Icon.Pin, 'Endereço', 'Av. Rio Branco, 156 — Centro, Rio de Janeiro, RJ'],
                ].map(([Ic, label, val]) => (
                  <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                    <div style={{
                      width: 48, height: 48, borderRadius: 14,
                      background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.14)',
                      color: 'var(--gold)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                    }}>
                      <Ic width="20" height="20" />
                    </div>
                    <div>
                      <div style={{ fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.55)' }}>{label}</div>
                      <div style={{ fontSize: 16, marginTop: 2 }}>{val}</div>
                    </div>
                  </div>
                ))}
              </div>

              <div style={{ marginTop: 48, paddingTop: 24, borderTop: '1px solid rgba(255,255,255,0.12)', display: 'flex', alignItems: 'center', gap: 16 }}>
                <img src={window.__BRUNO_IMG} alt="Dr. Bruno" style={{ width: 56, height: 56, borderRadius: 999, objectFit: 'cover', objectPosition: '50% 25%', border: '2px solid var(--gold)' }} />
                <div>
                  <div className="serif" style={{ fontSize: 20 }}>Dr. Bruno Almeida</div>
                  <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)' }}>OAB/RJ 123.456 · Advocacia Geral</div>
                </div>
              </div>
            </div>
          </div>

          {/* Right: form */}
          <div className="contact-pane" style={{ padding: 56, background: 'rgba(255,255,255,0.04)', position: 'relative' }}>
            <form onSubmit={submit} style={{ display: 'grid', gap: 16 }}>
              <Field label="Seu nome" value={form.name} onChange={update('name')} placeholder="Como deseja ser chamado(a)" />
              <div className="rgrid" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                <Field label="E-mail" type="email" value={form.email} onChange={update('email')} placeholder="seu@email.com" />
                <Field label="Telefone" value={form.phone} onChange={update('phone')} placeholder="(11) 99999-9999" />
              </div>
              <div>
                <Label>Área de interesse</Label>
                <select value={form.area} onChange={update('area')} style={{
                  width: '100%', padding: '14px 16px', borderRadius: 12,
                  background: 'rgba(255,255,255,0.06)', color: '#fff',
                  border: '1px solid rgba(255,255,255,0.18)', fontSize: 14, outline: 'none',
                  fontFamily: 'inherit',
                }}>
                  <option value="" style={{ color: '#000' }}>Selecione uma área…</option>
                  {AREAS.map(a => <option key={a.title} style={{ color: '#000' }}>{a.title}</option>)}
                </select>
              </div>
              <div>
                <Label>Resumo do caso</Label>
                <textarea value={form.msg} onChange={update('msg')} rows="5" placeholder="Descreva brevemente sua situação…"
                  style={{
                    width: '100%', padding: '14px 16px', borderRadius: 12,
                    background: 'rgba(255,255,255,0.06)', color: '#fff', resize: 'vertical',
                    border: '1px solid rgba(255,255,255,0.18)', fontSize: 14, outline: 'none',
                    fontFamily: 'inherit',
                  }}/>
              </div>
              <div style={{ marginTop: 8 }}>
                <ButtonPrimary type="submit" style={{ width: '100%', justifyContent: 'space-between' }}>
                  {sent ? 'Mensagem enviada!' : 'Enviar mensagem'}
                </ButtonPrimary>
                <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginTop: 12, textAlign: 'center' }}>
                  Seus dados são confidenciais e protegidos pelo sigilo profissional.
                </p>
              </div>
            </form>
            {sent && (
              <div className="sent-overlay" style={{
                position: 'absolute', inset: 56, background: 'rgba(15,42,35,0.95)',
                borderRadius: 16, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16,
              }}>
                <div style={{ width: 64, height: 64, borderRadius: 999, background: 'var(--gold)', color: '#1a1a1a', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon.Check width="32" height="32" />
                </div>
                <div className="serif" style={{ fontSize: 28, color: '#fff' }}>Recebido!</div>
                <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.7)', textAlign: 'center', maxWidth: 280 }}>
                  Entrarei em contato em até 24h úteis. Obrigado pela confiança.
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </section>
  );
};
